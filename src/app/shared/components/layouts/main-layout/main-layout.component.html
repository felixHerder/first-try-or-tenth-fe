<nz-layout>
  <nz-header>
    <div class="app-container">
      <div class="logo">
        <a routerLink="/">
          <img src="/logo.png" alt="logo"/>
          <h1 nz-typography>First Try or Tenth</h1>
        </a>
      </div>
      <nav>
        <ul nz-menu nzTheme="dark" nzMode="horizontal">
          @for (nav of appNavPaths; track nav.path) {
            <li nz-menu-item nzMatchRouter>
              <a [routerLink]="['/', nav.path]">
                {{ nav.label }}
                <nz-icon [nzType]="nav.icon || 'project'" nzTheme="fill"/>
              </a>
            </li>
          }
        </ul>
      </nav>
    </div>
  </nz-header>
  <nz-content class="app-container">
    <app-loader></app-loader>
    <nz-breadcrumb>
      <nz-breadcrumb-item>Home</nz-breadcrumb-item>
      <nz-breadcrumb-item>List</nz-breadcrumb-item>
      <nz-breadcrumb-item>App</nz-breadcrumb-item>
    </nz-breadcrumb>
    <div class="inner-content">
      <router-outlet></router-outlet>
    </div>
  </nz-content>
  <nz-footer>Ant Design ©{{ date.getFullYear() }} Implement By Angular</nz-footer>
</nz-layout>
