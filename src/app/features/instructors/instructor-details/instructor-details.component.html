<!--Details-->
<div nz-flex nzJustify="space-between">
  <h2>Instructor Profile</h2>
  <button nz-button nzType="primary" nzDanger (click)="openDeleteModal()">Delete</button>
</div>
<form nz-form nzLayout="vertical" [formGroup]="profileForm" (ngSubmit)="submitForm()">
  <div nz-row [nzGutter]="16">
    <!--  Name  -->
    <div nz-col [nzSpan]="12">
      <nz-form-item>
        <nz-form-label nzRequired nzFor="name">Name</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="name" id="name">
        </nz-form-control>
      </nz-form-item>
    </div>
    <!--  Phone Number  -->
    <div nz-col [nzSpan]="12">
      <nz-form-item>
        <nz-form-label nzRequired nzFor="phoneNumber">Phone number</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="phoneNumber" id="phoneNumber">
        </nz-form-control>
      </nz-form-item>
    </div>
    <!--  Address -->
    <div nz-col [nzSpan]="12">
      <nz-form-item>
        <nz-form-label nzFor="address">Address</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="address" id="address">
        </nz-form-control>
      </nz-form-item>
    </div>
  </div>
  <nz-form-item>
    <nz-form-control>
      <button nz-button nzType="primary" nzSize="large" [disabled]="profileForm.invalid">Save</button>
    </nz-form-control>
  </nz-form-item>
</form>

<!--Delete Modal-->
<nz-modal [(nzVisible)]="isDeleteVisible" nzTitle="Delete Instructor" (nzOnCancel)="onDeleteCancel()"
          (nzOnOk)="onDeleteOk()">
  <ng-container *nzModalContent>
    <p>Are you sure you want to delete
      <b>{{ profileForm.getRawValue().name }}</b>?
    </p>
  </ng-container>
</nz-modal>

<!--Vehicles-->
<nz-divider></nz-divider>
<div nz-flex nzJustify="space-between">
  <h2>Vehicles</h2>
  <button nz-button nzType="primary" (click)="onVehicleAssignClick()">Assign</button>
</div>
<app-vehicles-table [vehicles]="vehicles()" [loading]="loading()" [pageSize]="3"></app-vehicles-table>
<app-vehicles-multi-selection-modal [isOpen]="isVehiclesModalOpen()"
                                    (onOk)="onVehiclesModalOk($event)"
                                    (onCancel)="onVehiclesModalCancel()"
                                    [vehicleUuids]="vehicleUuids()">
</app-vehicles-multi-selection-modal>


<!--Trainees-->
<nz-divider></nz-divider>
<div nz-flex nzJustify="space-between">
  <h2>Trainees</h2>
  <button nz-button nzType="primary" (click)="onTraineeAssignClick()">Assign</button>
</div>
<app-trainees-table [trainees]="trainees()" [loading]="loading()" [pageSize]="3"></app-trainees-table>
<app-trainees-multi-selection-modal [isOpen]="isTraineesModalOpen()"
                                    (onOk)="onTraineesModalOk($event)"
                                    (onCancel)="onTraineesModalCancel()"
                                    [traineeUuids]="traineeUuids()">
</app-trainees-multi-selection-modal>

<!--Sessions-->
<nz-divider></nz-divider>
<div nz-flex nzJustify="space-between">
  <h2>Sessions</h2>
</div>
<app-sessions-table [sessions]="sessions()" [loading]="loading()" [pageSize]="3"></app-sessions-table>
